<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment | HMG Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .brand-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        .accent-gradient { background: linear-gradient(90deg, #3b82f6, #2dd4bf); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='dashboard.html'">
                    <div class="brand-gradient p-2 rounded-lg text-white">
                        <i class="fas fa-graduation-cap text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-slate-900">HMG <span class="text-blue-600">ACADEMY</span></span>
                </div>
                <a href="lesson.html" class="text-blue-600 font-bold hover:underline flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Back to Lesson
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-12">
        <div id="quizHeader" class="text-center mb-12">
            <h1 id="quizTitle" class="text-4xl font-extrabold text-slate-900 mb-6 tracking-tight">Topic Assessment</h1>
            <div class="flex justify-center items-center gap-6">
                <div class="w-full max-w-md bg-slate-200 h-3 rounded-full overflow-hidden shadow-inner">
                    <div id="quizProgress" class="accent-gradient h-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <span id="quizStatus" class="text-sm font-extrabold text-slate-500 uppercase tracking-widest">Q 1/5</span>
            </div>
        </div>

        <div id="quizContainer" class="bg-white p-8 md:p-12 rounded-[3rem] shadow-xl border border-slate-100">
            <div id="questionArea">
                <div class="flex items-center gap-3 mb-6">
                    <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-tighter">Question</span>
                    <div class="h-px flex-grow bg-slate-100"></div>
                </div>
                <h3 id="questionText" class="text-2xl font-bold text-slate-800 mb-10 leading-tight">Loading question...</h3>
                <div id="optionsGrid" class="grid gap-4"></div>
            </div>
            
            <div id="resultArea" class="hidden text-center py-8 animate-in zoom-in duration-300">
                <div id="scoreIcon" class="text-8xl mb-6"></div>
                <h2 id="scoreText" class="text-5xl font-extrabold text-slate-900 mb-4">Your Score: 0%</h2>
                <p id="scoreMsg" class="text-slate-600 text-lg mb-10 max-w-md mx-auto leading-relaxed">Keep practicing to master this topic!</p>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <a id="certBtn" href="certificate.html" class="hidden bg-blue-600 text-white px-8 py-4 rounded-full font-extrabold text-lg hover:scale-105 transition shadow-xl">
                        Claim Certificate <i class="fas fa-award ml-2"></i>
                    </a>
                    <a href="dashboard.html" class="bg-slate-100 text-slate-700 px-8 py-4 rounded-full font-extrabold text-lg hover:bg-slate-200 transition inline-block">
                        Dashboard <i class="fas fa-home ml-2"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-10 flex justify-between items-center">
            <button id="prevBtn" class="text-slate-500 font-bold hover:text-blue-600 transition hidden">
                <i class="fas fa-chevron-left mr-2"></i> Previous
            </button>
            <button id="nextBtn" class="bg-slate-900 text-white px-8 py-3 rounded-full font-extrabold hover:bg-blue-600 transition ml-auto shadow-lg">
                Next <i class="fas fa-chevron-right ml-2"></i>
            </button>
        </div>
    </div>

    <script src="assets/js/quiz.js"></script>
</body>
</html>
