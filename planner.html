<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | HMG Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .brand-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                    <div class="brand-gradient p-2 rounded-lg text-white">
                        <i class="fas fa-graduation-cap text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-slate-900">HMG <span class="text-blue-600">ACADEMY</span></span>
                </div>
                <a href="dashboard.html" class="text-blue-600 font-bold hover:underline flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Academic Study Planner</h1>
            <p class="text-slate-500">Organize your learning and stay disciplined.</p>
        </div>

        <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-slate-200">
            <div class="flex flex-col md:flex-row gap-6 mb-12">
                <input type="text" id="taskInput" placeholder="What topic will you master today?" class="flex-grow p-4 rounded-2xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none font-medium text-lg">
                <button onclick="addTask()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-600 transition shadow-lg">
                    Add to Plan <i class="fas fa-plus ml-2"></i>
                </button>
            </div>

            <div id="plannerList" class="space-y-4">
                <!-- Tasks populated by JS -->
            </div>
        </div>
    </div>

    <script src="assets/js/planner.js"></script>
</body>
</html>
